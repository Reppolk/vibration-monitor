<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibraTrack - PWA Vibration Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-6 pb-20">

    <!-- Header -->
    <header class="w-full max-w-md text-center mb-6">
        <h1 class="text-3xl font-bold text-blue-400 tracking-tight">VibraTrack</h1>
        <p class="text-slate-400 text-sm mt-1">ISO 2631 Mobile Dosimeter</p>
    </header>

    <!-- Error/Message Modal -->
    <div id="messageBox" class="hide fixed top-4 left-1/2 transform -translate-x-1/2 z-50 w-11/12 max-w-sm glass-panel p-4 rounded-xl shadow-2xl text-center">
        <p id="messageText" class="text-sm font-medium"></p>
        <button onclick="closeMessage()" class="mt-3 px-4 py-1.5 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm transition">Dismiss</button>
    </div>

    <!-- Main Dashboard -->
    <main class="w-full max-w-md flex flex-col gap-4">
        
        <!-- Status & Timer Estimate -->
        <div class="glass-panel p-5 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden">
            <div id="statusIndicator" class="absolute top-3 right-3 w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></div>
            
            <div class="flex w-full justify-between items-center mb-4 border-b border-slate-700 pb-2">
                <span class="text-slate-400 text-xs font-semibold uppercase">Rec Time:</span>
                <span id="timerDisplay" class="text-lg font-mono font-bold text-blue-400">00:00.0</span>
            </div>

            <span class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Highest Axis A(8) Estimate</span>
            <div class="flex items-baseline gap-1">
                <span id="a8Value" class="text-5xl font-extrabold text-white">0.000</span>
                <span class="text-lg text-slate-400 font-medium">m/s²</span>
            </div>
            <span id="dominantAxis" class="text-blue-400 text-sm mt-2 font-medium">Monitoring Stopped</span>
        </div>

        <!-- Live RMS Values -->
        <div class="grid grid-cols-3 gap-3">
            <div class="glass-panel p-3 rounded-xl flex flex-col items-center">
                <span class="text-slate-400 text-xs mb-1">X-Axis (k=1.4)</span>
                <span id="rmsX" class="text-lg font-bold text-red-400">0.00</span>
            </div>
            <div class="glass-panel p-3 rounded-xl flex flex-col items-center">
                <span class="text-slate-400 text-xs mb-1">Y-Axis (k=1.4)</span>
                <span id="rmsY" class="text-lg font-bold text-green-400">0.00</span>
            </div>
            <div class="glass-panel p-3 rounded-xl flex flex-col items-center">
                <span class="text-slate-400 text-xs mb-1">Z-Axis (k=1.0)</span>
                <span id="rmsZ" class="text-lg font-bold text-blue-400">0.00</span>
            </div>
        </div>

        <!-- Chart Container -->
        <div class="glass-panel p-3 rounded-2xl w-full h-48 relative">
            <canvas id="vibChart"></canvas>
        </div>

        <!-- Settings & Controls -->
        <div class="glass-panel p-4 rounded-2xl mt-2">
            
            <!-- Timer Selection -->
            <div class="flex justify-between items-center mb-4">
                <label class="text-sm text-slate-300 font-medium">Auto-Stop Timer:</label>
                <select id="timerSelect" class="bg-slate-800 text-white text-sm rounded-lg p-2 border border-slate-600 focus:outline-none focus:border-blue-500">
                    <option value="0">Continuous (Manual Stop)</option>
                    <option value="30">30 Seconds</option>
                    <option value="60">1 Minute</option>
                    <option value="120">2 Minutes</option>
                    <option value="180">3 Minutes</option>
                    <option value="300">5 Minutes</option>
                </select>
            </div>

            <!-- Action Buttons -->
            <div class="grid grid-cols-2 gap-3 mb-3">
                <button id="startBtn" class="bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold py-3 px-2 rounded-xl shadow-lg transition duration-200">
                    Start Monitor
                </button>
                <button id="resetBtn" class="bg-slate-700 hover:bg-slate-600 active:bg-slate-800 text-white font-semibold py-3 px-2 rounded-xl shadow-lg transition duration-200 opacity-50 cursor-not-allowed" disabled>
                    Reset Data
                </button>
            </div>
            
            <!-- Export Button -->
            <button id="exportBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg transition duration-200 opacity-50 cursor-not-allowed" disabled>
                Export CSV Report
            </button>
        </div>

        <!-- Technical Stats -->
        <div class="text-center mt-2">
            <p class="text-xs text-slate-500" id="techStats">Samples: 0 | Buffer: 0</p>
        </div>
    </main>

    <script>
        // --- State Management ---
        let isRecording = false;
        let rawDataLog = []; 
        const maxGraphPoints = 50; 
        const rollingBuffer = 250; 
        
        let bufferX = [];
        let bufferY = [];
        let bufferZ = [];
        
        let sampleCount = 0;
        let lastUpdateTime = 0;

        // Time Management Variables (Crucial for Pause/Resume)
        let accumulatedTimeMs = 0; // Total time recorded so far
        let sessionStartTime = 0;  // Unix timestamp of when "Start/Resume" was clicked
        let timerIntervalUI = null;
        let targetDurationMs = 0;

        // Constants for ISO 2631
        const kX = 1.4;
        const kY = 1.4;
        const kZ = 1.0;

        // --- DOM Elements ---
        const btnStart = document.getElementById('startBtn');
        const btnReset = document.getElementById('resetBtn');
        const btnExport = document.getElementById('exportBtn');
        const elTimer = document.getElementById('timerDisplay');
        const timerSelect = document.getElementById('timerSelect');
        
        const elA8 = document.getElementById('a8Value');
        const elDominant = document.getElementById('dominantAxis');
        const elRmsX = document.getElementById('rmsX');
        const elRmsY = document.getElementById('rmsY');
        const elRmsZ = document.getElementById('rmsZ');
        const elStats = document.getElementById('techStats');
        const statusDot = document.getElementById('statusIndicator');

        // --- Chart.js Setup ---
        const ctx = document.getElementById('vibChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(maxGraphPoints).fill(''),
                datasets: [
                    { label: 'X', borderColor: '#f87171', borderWidth: 1.5, pointRadius: 0, data: Array(maxGraphPoints).fill(0), tension: 0.2 },
                    { label: 'Y', borderColor: '#4ade80', borderWidth: 1.5, pointRadius: 0, data: Array(maxGraphPoints).fill(0), tension: 0.2 },
                    { label: 'Z', borderColor: '#60a5fa', borderWidth: 1.5, pointRadius: 0, data: Array(maxGraphPoints).fill(0), tension: 0.2 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: { display: false },
                    y: { 
                        display: true, 
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { color: '#94a3b8', font: {size: 10} },
                        suggestedMin: -5,
                        suggestedMax: 5
                    }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- UI Helpers ---
        function showMessage(msg) {
            document.getElementById('messageText').innerText = msg;
            document.getElementById('messageBox').classList.remove('hide');
        }
        function closeMessage() {
            document.getElementById('messageBox').classList.add('hide');
        }
        
        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let deciseconds = Math.floor((ms % 1000) / 100);
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${deciseconds}`;
        }

        // Calculates RMS
        function calculateRMS(arr, kFactor) {
            if (arr.length === 0) return 0;
            const sumSq = arr.reduce((sum, val) => sum + (val * val), 0);
            return Math.sqrt(sumSq / arr.length) * kFactor;
        }

        // --- Sensor Event Handler ---
        function handleMotion(event) {
            if (!isRecording) return;

            let acc = event.acceleration;
            if (!acc || acc.x === null) {
                acc = event.accelerationIncludingGravity;
                if (!acc || acc.x === null) return;
            }

            // Calculate exact relative time to prevent huge gaps if user paused
            const currentSessionTime = Date.now() - sessionStartTime;
            const currentRelativeTimeMs = accumulatedTimeMs + currentSessionTime;

            const x = acc.x;
            const y = acc.y;
            const z = acc.z;

            // 1. Add to raw data log
            rawDataLog.push({ t: currentRelativeTimeMs, x, y, z });
            sampleCount++;

            // 2. Buffer Management
            bufferX.push(x);
            bufferY.push(y);
            bufferZ.push(z);

            if (bufferX.length > rollingBuffer) {
                bufferX.shift();
                bufferY.shift();
                bufferZ.shift();
            }

            // 3. Update Chart Arrays
            chart.data.datasets[0].data.push(x);
            chart.data.datasets[1].data.push(y);
            chart.data.datasets[2].data.push(z);
            
            if (chart.data.datasets[0].data.length > maxGraphPoints) {
                chart.data.datasets[0].data.shift();
                chart.data.datasets[1].data.shift();
                chart.data.datasets[2].data.shift();
            }

            // 4. Check Auto-Stop Timer
            if (targetDurationMs > 0 && currentRelativeTimeMs >= targetDurationMs) {
                toggleMonitor(); // Pause it automatically
                showMessage(`Auto-Stop reached: ${targetDurationMs/1000} seconds completed.`);
            }

            // 5. Throttle Dashboard Updates
            const now = Date.now();
            if (now - lastUpdateTime > 100) {
                updateDashboard();
                chart.update();
                lastUpdateTime = now;
            }
        }

        // --- Timer UI Update ---
        function updateTimerUI() {
            if (!isRecording) return;
            const currentSessionTime = Date.now() - sessionStartTime;
            const currentRelativeTimeMs = accumulatedTimeMs + currentSessionTime;
            
            // If counting down
            if (targetDurationMs > 0) {
                let remaining = targetDurationMs - currentRelativeTimeMs;
                if (remaining < 0) remaining = 0;
                elTimer.innerText = formatTime(remaining);
            } else {
                // If counting up
                elTimer.innerText = formatTime(currentRelativeTimeMs);
            }
        }

        // --- Dashboard Update Logic ---
        function updateDashboard() {
            const rmsX = calculateRMS(bufferX, kX);
            const rmsY = calculateRMS(bufferY, kY);
            const rmsZ = calculateRMS(bufferZ, kZ);

            elRmsX.innerText = rmsX.toFixed(3);
            elRmsY.innerText = rmsY.toFixed(3);
            elRmsZ.innerText = rmsZ.toFixed(3);

            const maxRms = Math.max(rmsX, rmsY, rmsZ);
            let domAxisName = "Z-Axis";
            if (maxRms === rmsX) domAxisName = "X-Axis";
            if (maxRms === rmsY) domAxisName = "Y-Axis";

            elA8.innerText = maxRms.toFixed(3);
            if(isRecording) {
                elDominant.innerText = `Dominant: ${domAxisName}`;
            }

            elStats.innerText = `Samples: ${sampleCount} | Buffer: ${bufferX.length}`;

            // Colors for limits
            if (maxRms > 0.5) {
                elA8.classList.add('text-yellow-400');
                elA8.classList.remove('text-white', 'text-red-500');
            } 
            if (maxRms > 1.15) {
                elA8.classList.add('text-red-500');
                elA8.classList.remove('text-white', 'text-yellow-400');
            }
            if (maxRms <= 0.5) {
                elA8.classList.add('text-white');
                elA8.classList.remove('text-yellow-400', 'text-red-500');
            }
        }

        // --- Start/Pause Logic ---
        async function toggleMonitor() {
            if (isRecording) {
                // *** PAUSE LOGIC ***
                isRecording = false;
                window.removeEventListener('devicemotion', handleMotion, true);
                clearInterval(timerIntervalUI);
                
                // Save accumulated time
                accumulatedTimeMs += (Date.now() - sessionStartTime);
                
                // UI Changes
                btnStart.innerText = "Resume Monitor";
                btnStart.classList.replace('bg-red-600', 'bg-blue-600');
                btnStart.classList.replace('hover:bg-red-500', 'hover:bg-blue-500');
                statusDot.classList.replace('bg-green-500', 'bg-red-500');
                statusDot.classList.replace('shadow-[0_0_8px_#22c55e]', 'shadow-[0_0_8px_#ef4444]');
                elDominant.innerText = "Monitoring Paused";
                timerSelect.disabled = false; // allow changing timer while paused
                
                // Enable Export and Reset buttons
                if (rawDataLog.length > 0) {
                    btnExport.disabled = false;
                    btnExport.classList.remove('opacity-50', 'cursor-not-allowed');
                    btnReset.disabled = false;
                    btnReset.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            } else {
                // *** START/RESUME LOGIC ***
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceMotionEvent.requestPermission();
                        if (permissionState === 'granted') {
                            startSensors();
                        } else {
                            showMessage("Sensor permission denied.");
                        }
                    } catch (error) {
                        showMessage("Error requesting sensor access. Ensure HTTPS.");
                    }
                } else {
                    if(window.DeviceMotionEvent) {
                         startSensors();
                    } else {
                         showMessage("Device Motion API not supported.");
                    }
                }
            }
        }

        function startSensors() {
            isRecording = true;
            sessionStartTime = Date.now();
            
            // Get Target Duration
            let secondsSelected = parseInt(timerSelect.value);
            targetDurationMs = secondsSelected > 0 ? secondsSelected * 1000 : 0;
            timerSelect.disabled = true; // Lock dropdown during recording

            window.addEventListener('devicemotion', handleMotion, true);
            
            // UI Changes
            btnStart.innerText = "Pause Monitor";
            btnStart.classList.replace('bg-blue-600', 'bg-red-600');
            btnStart.classList.replace('hover:bg-blue-500', 'hover:bg-red-500');
            statusDot.classList.replace('bg-red-500', 'bg-green-500');
            statusDot.classList.replace('shadow-[0_0_8px_#ef4444]', 'shadow-[0_0_8px_#22c55e]');
            
            // Disable Export & Reset while recording
            btnExport.disabled = true;
            btnExport.classList.add('opacity-50', 'cursor-not-allowed');
            btnReset.disabled = true;
            btnReset.classList.add('opacity-50', 'cursor-not-allowed');

            timerIntervalUI = setInterval(updateTimerUI, 100);
            
            setTimeout(() => {
                if(sampleCount === 0) {
                    showMessage("Started, but no data received. Check device sensors.");
                    toggleMonitor(); 
                }
            }, 1500);
        }

        // --- Reset Logic ---
        function resetData() {
            if (isRecording) return; // Prevent reset while running
            
            if (confirm("Are you sure you want to clear all recorded data? This cannot be undone.")) {
                bufferX = []; bufferY = []; bufferZ = [];
                rawDataLog = [];
                sampleCount = 0;
                accumulatedTimeMs = 0;
                lastUpdateTime = 0;
                targetDurationMs = 0;

                // Clear Chart
                chart.data.datasets.forEach(ds => ds.data = Array(maxGraphPoints).fill(0));
                chart.update();

                // Reset UI
                updateDashboard();
                elTimer.innerText = "00:00.0";
                btnStart.innerText = "Start Monitor";
                elDominant.innerText = "Monitoring Stopped";
                
                // Disable Export and Reset again
                btnExport.disabled = true;
                btnExport.classList.add('opacity-50', 'cursor-not-allowed');
                btnReset.disabled = true;
                btnReset.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        // --- Export to CSV ---
        function exportCSV() {
            if (rawDataLog.length === 0) return;
            
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Timestamp(ms),X_Acc(m/s2),Y_Acc(m/s2),Z_Acc(m/s2)\n";
            
            rawDataLog.forEach(row => {
                // Ensure no trailing decimals on timestamps
                csvContent += `${Math.round(row.t)},${row.x.toFixed(4)},${row.y.toFixed(4)},${row.z.toFixed(4)}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `vibra_log_${Date.now()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- Event Listeners ---
        btnStart.addEventListener('click', toggleMonitor);
        btnReset.addEventListener('click', resetData);
        btnExport.addEventListener('click', exportCSV);

    </script>
</body>
</html>
